<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ClearSky — RC Airspace Checker</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --bg: #0f1923;
    --surface: #1a2736;
    --surface2: #243447;
    --text: #e8edf2;
    --text-dim: #8899aa;
    --accent: #38bdf8;
    --radius: 14px;
    --font: 'DM Sans', sans-serif;
    --mono: 'Space Mono', monospace;
  }

- { margin:0; padding:0; box-sizing:border-box; }

body {
font-family: var(–font);
background: var(–bg);
color: var(–text);
height: 100dvh;
width: 100vw;
overflow: hidden;
display: flex;
flex-direction: column;
}

/* ── Top Bar ── */
#topbar {
display: flex;
align-items: center;
justify-content: space-between;
padding: 10px 16px;
background: var(–surface);
border-bottom: 1px solid rgba(255,255,255,0.06);
z-index: 20;
flex-shrink: 0;
}
#topbar .logo {
font-family: var(–mono);
font-weight: 700;
font-size: 18px;
letter-spacing: -0.5px;
display: flex;
align-items: center;
gap: 8px;
}
#topbar .logo svg { width: 22px; height: 22px; }
#topbar .tag {
font-size: 10px;
font-weight: 600;
background: var(–accent);
color: var(–bg);
padding: 2px 7px;
border-radius: 6px;
text-transform: uppercase;
letter-spacing: 0.5px;
}

/* ── Map ── */
#map {
flex: 1;
position: relative;
}

/* ── Status Card (the traffic light) ── */
#status-card {
position: absolute;
bottom: 24px;
left: 50%;
transform: translateX(-50%);
z-index: 15;
width: calc(100% - 32px);
max-width: 420px;
background: var(–surface);
border-radius: var(–radius);
border: 1px solid rgba(255,255,255,0.08);
box-shadow: 0 12px 40px rgba(0,0,0,0.5);
overflow: hidden;
transition: all 0.3s ease;
}
#status-card.green  { border-color: var(–green); }
#status-card.yellow { border-color: var(–yellow); }
#status-card.red    { border-color: var(–red); }

#status-header {
display: flex;
align-items: center;
gap: 14px;
padding: 16px 18px;
cursor: pointer;
}
#status-light {
width: 48px;
height: 48px;
border-radius: 50%;
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: center;
font-size: 22px;
transition: all 0.4s ease;
animation: pulse-glow 2.5s ease-in-out infinite;
}
@keyframes pulse-glow {
0%, 100% { box-shadow: 0 0 12px rgba(255,255,255,0.1); }
50% { box-shadow: 0 0 24px rgba(255,255,255,0.2); }
}
.green #status-light  { background: var(–green); box-shadow: 0 0 20px rgba(34,197,94,0.4); }
.yellow #status-light { background: var(–yellow); box-shadow: 0 0 20px rgba(234,179,8,0.4); }
.red #status-light    { background: var(–red); box-shadow: 0 0 20px rgba(239,68,68,0.4); }

#status-text {
flex: 1;
}
#status-text h2 {
font-size: 17px;
font-weight: 700;
line-height: 1.2;
margin-bottom: 2px;
}
#status-text p {
font-size: 13px;
color: var(–text-dim);
line-height: 1.35;
}
#expand-arrow {
font-size: 18px;
color: var(–text-dim);
transition: transform 0.25s ease;
flex-shrink: 0;
}
#status-card.expanded #expand-arrow { transform: rotate(180deg); }

#status-details {
max-height: 0;
overflow: hidden;
transition: max-height 0.35s ease;
}
#status-card.expanded #status-details {
max-height: 400px;
}
#details-inner {
padding: 0 18px 16px;
display: flex;
flex-direction: column;
gap: 10px;
}
.detail-row {
display: flex;
justify-content: space-between;
align-items: center;
font-size: 13px;
padding: 8px 12px;
background: var(–surface2);
border-radius: 8px;
}
.detail-row .label { color: var(–text-dim); }
.detail-row .value { font-weight: 600; font-family: var(–mono); font-size: 12px; }

/* ── Search ── */
#search-wrap {
position: absolute;
top: 12px;
left: 12px;
right: 12px;
z-index: 15;
display: flex;
gap: 8px;
}
#search-input {
flex: 1;
padding: 12px 16px;
border-radius: 10px;
border: 1px solid rgba(255,255,255,0.1);
background: var(–surface);
color: var(–text);
font-family: var(–font);
font-size: 14px;
outline: none;
transition: border-color 0.2s;
}
#search-input::placeholder { color: var(–text-dim); }
#search-input:focus { border-color: var(–accent); }

#btn-locate {
width: 46px;
height: 46px;
border-radius: 10px;
border: 1px solid rgba(255,255,255,0.1);
background: var(–surface);
color: var(–accent);
font-size: 20px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
transition: background 0.2s;
}
#btn-locate:hover { background: var(–surface2); }
#btn-locate:active { transform: scale(0.95); }

/* ── Loading State ── */
#loading-overlay {
position: absolute;
inset: 0;
background: var(–bg);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
z-index: 50;
transition: opacity 0.5s;
}
#loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loader {
width: 40px; height: 40px;
border: 3px solid var(–surface2);
border-top-color: var(–accent);
border-radius: 50%;
animation: spin 0.8s linear infinite;
margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-overlay p { color: var(–text-dim); font-size: 14px; }

/* ── Legend Toggle ── */
#legend-btn {
position: absolute;
top: 70px;
right: 12px;
z-index: 15;
width: 36px;
height: 36px;
border-radius: 8px;
border: 1px solid rgba(255,255,255,0.1);
background: var(–surface);
color: var(–text);
font-size: 16px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
}
#legend-panel {
position: absolute;
top: 112px;
right: 12px;
z-index: 15;
background: var(–surface);
border: 1px solid rgba(255,255,255,0.08);
border-radius: 10px;
padding: 14px;
font-size: 12px;
display: none;
min-width: 170px;
box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
#legend-panel.show { display: block; }
.legend-item {
display: flex;
align-items: center;
gap: 8px;
margin-bottom: 8px;
}
.legend-item:last-child { margin-bottom: 0; }
.legend-swatch {
width: 14px;
height: 14px;
border-radius: 3px;
flex-shrink: 0;
}

/* ── Maplibre overrides ── */
.maplibregl-ctrl-attrib { font-size: 10px !important; }
.maplibregl-popup-content {
background: var(–surface) !important;
color: var(–text) !important;
border-radius: 8px !important;
padding: 10px 14px !important;
font-family: var(–font) !important;
font-size: 13px !important;
box-shadow: 0 4px 16px rgba(0,0,0,0.4) !important;
border: 1px solid rgba(255,255,255,0.08) !important;
}
.maplibregl-popup-tip { border-top-color: var(–surface) !important; }
</style>

</head>
<body>

<!-- Top Bar -->

<div id="topbar">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 12C2 6.48 6.48 2 12 2s10 4.48 10 10"/>
      <path d="M2 12c0 5.52 4.48 10 10 10"/>
      <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
      <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
    </svg>
    ClearSky
  </div>
  <span class="tag">RC Airspace</span>
</div>

<!-- Map Container -->

<div id="map">
  <!-- Search -->
  <div id="search-wrap">
    <input id="search-input" type="text" placeholder="Search location or flying field…" autocomplete="off">
    <button id="btn-locate" title="Use my location">⦿</button>
  </div>

  <!-- Legend -->

<button id="legend-btn" title="Airspace legend">☰</button>

  <div id="legend-panel">
    <div class="legend-item"><div class="legend-swatch" style="background:rgba(239,68,68,0.45)"></div>Class B (Busiest)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:rgba(234,179,8,0.4)"></div>Class C (Medium)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:rgba(139,92,246,0.4)"></div>Class D (Towered)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:rgba(56,189,248,0.25)"></div>Class E (Surface)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:rgba(34,197,94,0.15)"></div>Class G (Fly free!)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:rgba(239,68,68,0.6)"></div>Restricted / TFR</div>
  </div>

  <!-- Status Card -->

  <div id="status-card" class="green">
    <div id="status-header" onclick="toggleDetails()">
      <div id="status-light">✓</div>
      <div id="status-text">
        <h2 id="status-title">Checking airspace…</h2>
        <p id="status-sub">Tap the location button to begin</p>
      </div>
      <span id="expand-arrow">▾</span>
    </div>
    <div id="status-details">
      <div id="details-inner">
        <div class="detail-row"><span class="label">Airspace Class</span><span class="value" id="d-class">—</span></div>
        <div class="detail-row"><span class="label">Max Altitude</span><span class="value" id="d-alt">—</span></div>
        <div class="detail-row"><span class="label">Authorization</span><span class="value" id="d-auth">—</span></div>
        <div class="detail-row"><span class="label">Nearest Airport</span><span class="value" id="d-airport">—</span></div>
        <div class="detail-row"><span class="label">Coordinates</span><span class="value" id="d-coords">—</span></div>
      </div>
    </div>
  </div>

  <!-- Loading -->

  <div id="loading-overlay">
    <div class="loader"></div>
    <p>Loading airspace data…</p>
  </div>
</div>

<script>
// ──────────────────────────────────────────
//  ClearSky — RC Airspace Checker
//  "Like George Kittle finding the open seam,
//   we find the open airspace." 
// ──────────────────────────────────────────

const FAA_AIRSPACE_URL = 'https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/arcgis/rest/services/US_Airspace/FeatureServer';
const LAYER_IDS = { classB: 0, classC: 1, classD: 2, classE: 3 };

let map, airspaceData = {}, userMarker = null;

// ── Init Map ──
function initMap() {
  map = new maplibregl.Map({
    container: 'map',
    style: {
      version: 8,
      sources: {
        'osm-tiles': {
          type: 'raster',
          tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
          tileSize: 256,
          attribution: '© OpenStreetMap'
        }
      },
      layers: [{
        id: 'osm-base',
        type: 'raster',
        source: 'osm-tiles',
        paint: {
          'raster-saturation': -0.6,
          'raster-brightness-min': 0.04,
          'raster-brightness-max': 0.45,
          'raster-contrast': 0.1
        }
      }]
    },
    center: [-98.5, 39.8],
    zoom: 4,
    maxZoom: 16
  });

  map.addControl(new maplibregl.NavigationControl(), 'top-right');

  map.on('load', () => {
    loadAirspaceData();
    map.on('click', onMapClick);
  });
}

// ── Load FAA Airspace from ArcGIS ──
async function loadAirspaceData() {
  const classes = [
    { key: 'classB', id: 0, color: 'rgba(239,68,68,0.3)', outline: '#ef4444', label: 'B' },
    { key: 'classC', id: 1, color: 'rgba(234,179,8,0.25)', outline: '#eab308', label: 'C' },
    { key: 'classD', id: 2, color: 'rgba(139,92,246,0.25)', outline: '#8b5cf6', label: 'D' },
    { key: 'classE', id: 3, color: 'rgba(56,189,248,0.15)', outline: '#38bdf8', label: 'E' },
  ];

  let loaded = 0;
  for (const cls of classes) {
    try {
      const url = `${FAA_AIRSPACE_URL}/${cls.id}/query?where=1=1&outFields=*&f=geojson&resultRecordCount=5000`;
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const geojson = await resp.json();
      airspaceData[cls.key] = geojson;

      map.addSource(`airspace-${cls.key}`, { type: 'geojson', data: geojson });
      map.addLayer({
        id: `airspace-${cls.key}-fill`,
        type: 'fill',
        source: `airspace-${cls.key}`,
        paint: { 'fill-color': cls.color }
      });
      map.addLayer({
        id: `airspace-${cls.key}-line`,
        type: 'line',
        source: `airspace-${cls.key}`,
        paint: { 'line-color': cls.outline, 'line-width': 1.5, 'line-opacity': 0.6 }
      });
    } catch (e) {
      console.warn(`Could not load Class ${cls.label}:`, e.message);
    }
    loaded++;
    if (loaded === classes.length) hideLoading();
  }
  // If all fail, still hide loading
  hideLoading();
}

function hideLoading() {
  document.getElementById('loading-overlay').classList.add('hidden');
}

// ── Check Airspace at Point ──
function checkAirspace(lng, lat) {
  const pt = turf.point([lng, lat]);
  let result = { cls: 'G', color: 'green', maxAlt: 400, auth: 'None needed', label: '' };

  // Check from most restrictive down
  const checks = [
    { key: 'classB', cls: 'B', color: 'red', alt: 0, auth: 'LAANC or DroneZone' },
    { key: 'classC', cls: 'C', color: 'yellow', alt: 200, auth: 'LAANC recommended' },
    { key: 'classD', cls: 'D', color: 'yellow', alt: 200, auth: 'LAANC recommended' },
    { key: 'classE', cls: 'E (sfc)', color: 'yellow', alt: 400, auth: 'Check LAANC grid' },
  ];

  for (const chk of checks) {
    const data = airspaceData[chk.key];
    if (!data || !data.features) continue;
    for (const feat of data.features) {
      try {
        if (turf.booleanPointInPolygon(pt, feat)) {
          result = { cls: chk.cls, color: chk.color, maxAlt: chk.alt, auth: chk.auth };
          // Get airport name if available
          const props = feat.properties || {};
          result.label = props.NAME || props.IDENT || props.name || props.ident || '';
          return result; // Return most restrictive match
        }
      } catch(e) { /* skip invalid geom */ }
    }
  }
  return result;
}

// ── Update Status Card ──
function updateStatus(result, lat, lng) {
  const card = document.getElementById('status-card');
  card.className = result.color;
  if (card.classList.contains('expanded')) card.classList.add('expanded');

  const icons = { green: '✓', yellow: '⚠', red: '✕' };
  const titles = {
    green: "You're clear to fly!",
    yellow: 'Controlled airspace — check rules',
    red: 'Authorization required'
  };
  const subs = {
    green: `Class G airspace. Fly up to ${result.maxAlt} ft AGL. No authorization needed.`,
    yellow: `Class ${result.cls} airspace. Max ${result.maxAlt} ft. ${result.auth}.`,
    red: `Class ${result.cls} airspace. Flight restricted here. ${result.auth}.`
  };

  document.getElementById('status-light').textContent = icons[result.color];
  document.getElementById('status-title').textContent = titles[result.color];
  document.getElementById('status-sub').textContent = subs[result.color];

  document.getElementById('d-class').textContent = `Class ${result.cls}`;
  document.getElementById('d-alt').textContent = `${result.maxAlt} ft AGL`;
  document.getElementById('d-auth').textContent = result.auth;
  document.getElementById('d-airport').textContent = result.label || 'None nearby';
  document.getElementById('d-coords').textContent = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
}

// ── Map Click Handler ──
function onMapClick(e) {
  const { lng, lat } = e.lngLat;
  placeMarker(lng, lat);
  const result = checkAirspace(lng, lat);
  updateStatus(result, lat, lng);
}

function placeMarker(lng, lat) {
  if (userMarker) userMarker.remove();

  const el = document.createElement('div');
  el.style.cssText = `
    width:20px;height:20px;border-radius:50%;
    background:var(--accent);border:3px solid #fff;
    box-shadow:0 2px 8px rgba(0,0,0,0.4);
  `;
  userMarker = new maplibregl.Marker({ element: el }).setLngLat([lng, lat]).addTo(map);
}

// ── Geolocate ──
document.getElementById('btn-locate').addEventListener('click', () => {
  const btn = document.getElementById('btn-locate');
  btn.textContent = '…';
  if ('geolocation' in navigator) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        const { latitude: lat, longitude: lng } = pos.coords;
        map.flyTo({ center: [lng, lat], zoom: 12, duration: 1500 });
        placeMarker(lng, lat);
        const result = checkAirspace(lng, lat);
        updateStatus(result, lat, lng);
        btn.textContent = '⦿';
      },
      err => {
        alert('Could not get your location. Make sure location access is enabled.');
        btn.textContent = '⦿';
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  } else {
    alert('Geolocation not supported in this browser.');
    btn.textContent = '⦿';
  }
});

// ── Search (Nominatim) ──
let searchTimeout;
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    doSearch();
  }
});

async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  try {
    const resp = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&countrycodes=us`);
    const data = await resp.json();
    if (data.length > 0) {
      const { lon, lat } = data[0];
      const lng = parseFloat(lon), la = parseFloat(lat);
      map.flyTo({ center: [lng, la], zoom: 12, duration: 1500 });
      placeMarker(lng, la);
      const result = checkAirspace(lng, la);
      updateStatus(result, la, lng);
    } else {
      alert('Location not found. Try a city name or address.');
    }
  } catch (e) {
    alert('Search failed. Check your connection.');
  }
}

// ── Toggle Details ──
function toggleDetails() {
  document.getElementById('status-card').classList.toggle('expanded');
}

// ── Legend Toggle ──
document.getElementById('legend-btn').addEventListener('click', () => {
  document.getElementById('legend-panel').classList.toggle('show');
});

// ── Init ──
initMap();
</script>

</body>
</html>
